version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: tf_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tradeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tradeflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-tradeflow}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tf_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tf_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tf_kafka
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tf_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tradeflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: tf_api_gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      AUTH_SERVICE_URL: http://auth-service:3001
      MARKET_DATA_SERVICE_URL: http://market-data-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
      PORTFOLIO_SERVICE_URL: http://portfolio-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      ADMIN_SERVICE_URL: http://admin-service:3006
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      - redis
      - auth-service
      - market-data-service
      - order-service
      - portfolio-service
      - notification-service
      - admin-service

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: tf_auth_service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradeflow}:${POSTGRES_PASSWORD:-tradeflow_secret}@postgres:5432/${POSTGRES_DB:-tradeflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refresh_supersecret}
      KAFKA_BROKERS: kafka:29092
      UPSTOX_API_KEY: ${UPSTOX_API_KEY}
      UPSTOX_API_SECRET: ${UPSTOX_API_SECRET}
      UPSTOX_REDIRECT_URI: ${UPSTOX_REDIRECT_URI:-http://localhost:3000/api/auth/upstox/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  market-data-service:
    build:
      context: .
      dockerfile: services/market-data-service/Dockerfile
    container_name: tf_market_data_service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      KAFKA_BROKERS: kafka:29092
      UPSTOX_API_KEY: ${UPSTOX_API_KEY}
      UPSTOX_API_SECRET: ${UPSTOX_API_SECRET}
      UPSTOX_BASE_URL: https://api.upstox.com/v2
      ANGEL_ONE_API_KEY: ${ANGEL_ONE_API_KEY}
      ANGEL_ONE_CLIENT_CODE: ${ANGEL_ONE_CLIENT_CODE}
    depends_on:
      redis:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: tf_order_service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradeflow}:${POSTGRES_PASSWORD:-tradeflow_secret}@postgres:5432/${POSTGRES_DB:-tradeflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      KAFKA_BROKERS: kafka:29092
      UPSTOX_API_KEY: ${UPSTOX_API_KEY}
      UPSTOX_API_SECRET: ${UPSTOX_API_SECRET}
      UPSTOX_BASE_URL: https://api.upstox.com/v2
    depends_on:
      postgres:
        condition: service_healthy

  portfolio-service:
    build:
      context: .
      dockerfile: services/portfolio-service/Dockerfile
    container_name: tf_portfolio_service
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradeflow}:${POSTGRES_PASSWORD:-tradeflow_secret}@postgres:5432/${POSTGRES_DB:-tradeflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_prod}
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: tf_notification_service
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradeflow}:${POSTGRES_PASSWORD:-tradeflow_secret}@postgres:5432/${POSTGRES_DB:-tradeflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      KAFKA_BROKERS: kafka:29092
      SMTP_HOST: ${SMTP_HOST:-smtp.sendgrid.net}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-apikey}
      SMTP_PASS: ${SENDGRID_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@tradeflow.in}
      FROM_NAME: ${FROM_NAME:-TradeFlow}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    container_name: tf_admin_service
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradeflow}:${POSTGRES_PASSWORD:-tradeflow_secret}@postgres:5432/${POSTGRES_DB:-tradeflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_prod}
    depends_on:
      postgres:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: tf_payment_service
    ports:
      - "3007:3007"
    environment:
      NODE_ENV: production
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER:-tradeflow}:${POSTGRES_PASSWORD:-tradeflow_secret}@postgres:5432/${POSTGRES_DB:-tradeflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
        
volumes:
  postgres_data:
  redis_data:
